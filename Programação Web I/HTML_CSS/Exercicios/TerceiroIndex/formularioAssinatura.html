<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Assine o Jornal Economia e receba as principais notícias do mercado financeiro."
    />

    <title>Assinatura | Jornal Economia</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="header-content">
        <div class="logo-area">
          <h1 class="logo">Jornal Economia</h1>
        </div>
      </div>
    </header>

    <!-- FORMULÁRIO -->
    <main class="form-page">
      <section class="form-container">
        <h1>Assine o Jornal Economia</h1>

        <form class="subscription-form" id="subscriptionForm">
          <!-- NOME -->
          <div class="form-group">
            <label for="nome">Nome</label>

            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Digite seu nome"
              required
            />
          </div>

          <!-- EMAIL -->
          <div class="form-group">
            <label for="email">E-mail</label>

            <input
              type="email"
              id="email"
              name="email"
              placeholder="Digite seu e-mail"
              required
            />
          </div>

          <!-- TELEFONE -->
          <div class="form-group">
            <label for="telefone">Telefone</label>

            <input
              type="tel"
              id="telefone"
              name="telefone"
              placeholder="(11) 99999-9999"
            />
          </div>

          <!-- PLANO -->
          <div class="form-group">
            <label for="plano">Plano de assinatura</label>

            <select id="plano" name="plano">
              <option value="Mensal">Mensal</option>

              <option value="Semestral">Semestral</option>

              <option value="Anual">Anual</option>
            </select>
          </div>

          <!-- BOTÃO -->
          <button type="submit" class="submit-btn">Confirmar Assinatura</button>
        </form>

        <!-- VOLTAR -->
        <a href="index.html" class="back-link"> ← Voltar ao portal </a>
      </section>
    </main>

    <!-- SCRIPT -->
    <script src="script.js"></script>
  </body>
</html>
