<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tipos de Animação CSS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Tipos de Animações em CSS</h1>

  <!-- 1. Transição -->
  <section>
    <h2>1. Transição (hover)</h2>
    <button class="btn">Passe o mouse</button>
  </section>

  <!-- 2. Keyframes -->
  <section>
    <h2>2. Animação com Keyframes</h2>
    <div class="box mover"></div>
  </section>

  <!-- 3. Transform -->
  <section>
    <h2>3. Transform (rotação + escala)</h2>
    <div class="box transform"></div>
  </section>

  <!-- 4. Opacidade -->
  <section>
    <h2>4. Fade (opacity)</h2>
    <div class="box fade"></div>
  </section>

  <!-- 5. Layout -->
  <section>
    <h2>5. Mudança de tamanho</h2>
    <div class="box crescer"></div>
  </section>

  <!-- 6. Cor -->
  <section>
    <h2>6. Mudança de cor</h2>
    <div class="box cor"></div>
  </section>

  <!-- 7. Sombra -->
  <section>
    <h2>7. Efeito glow (sombra)</h2>
    <div class="box glow"></div>
  </section>

</body>
</html>
