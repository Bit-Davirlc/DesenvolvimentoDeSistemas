<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Calculadora de Area do Triangulo</h1>
</body>
<script>
    let base = prompt ("Digite a base:");
    let altura = prompt ("Digite a altura:");

    let area = (base * altura) / 2;

    alert(`A base do triangulo é: ${base}`);
    alert(`A altura do triangulo é: ${altura}`);
    alert(`A área do triangulo é: ${area}`);
</script>
</html>
